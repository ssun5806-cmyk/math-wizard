<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수학 마법사: 연산 방어전</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#140b2b;
    --void-deep:#0b0620;
    --twilight:#3d2467;
    --arcane:#5ee7ff;
    --arcane-dim:#3aa7c2;
    --ember:#ff7847;
    --gold:#ffd166;
    --gold-dark:#c99a2e;
    --cloud:#f3edff;
    --danger:#ff4d6d;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Noto Sans KR', sans-serif;
    background:
      radial-gradient(circle at 20% 15%, rgba(94,231,255,0.08), transparent 40%),
      radial-gradient(circle at 80% 85%, rgba(255,120,71,0.08), transparent 45%),
      linear-gradient(180deg, var(--void) 0%, var(--void-deep) 100%);
    color:var(--cloud);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    overflow-x:hidden;
    position:relative;
  }
  .stars{ position:fixed; inset:0; overflow:hidden; z-index:0; pointer-events:none; }
  .star{ position:absolute; width:3px; height:3px; background:#fff; border-radius:50%; opacity:0.6; animation: twinkle 3s ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{opacity:0.15;} 50%{opacity:0.9;} }

  #game-container{
    position:relative; z-index:1; width:100%; max-width:460px;
    background:linear-gradient(160deg, rgba(61,36,103,0.55), rgba(20,11,43,0.85));
    border:1px solid rgba(94,231,255,0.25);
    border-radius:20px;
    padding:22px 20px 26px;
    box-shadow:0 30px 70px -25px rgba(0,0,0,0.7), 0 0 40px rgba(94,231,255,0.08) inset;
  }
  .screen{ display:none; }
  .screen.active{ display:block; animation:fadeIn .4s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  h2.title{
    font-family:'Black Han Sans', sans-serif; font-size:24px; text-align:center; letter-spacing:0.5px;
    margin:4px 0 16px; color:var(--cloud); text-shadow:0 0 18px rgba(94,231,255,0.5);
  }
  .eyebrow{ text-align:center; font-size:11px; letter-spacing:2px; color:var(--arcane); font-weight:700; margin-bottom:4px; }

  input[type="text"]#playerNameInput{
    width:100%; padding:13px 14px; border-radius:12px; border:2px solid var(--arcane-dim);
    background:rgba(255,255,255,0.06); color:var(--cloud); font-size:15px; font-family:'Noto Sans KR';
    margin-bottom:14px; outline:none;
  }
  input#playerNameInput::placeholder{ color:#8a80ad; }
  input#playerNameInput:focus{ border-color:var(--arcane); box-shadow:0 0 0 3px rgba(94,231,255,0.2); }

  .stat-panel{ display:flex; gap:10px; margin-bottom:18px; }
  .stat-card{ flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:10px 12px; text-align:center; }
  .stat-card .label{ font-size:11px; color:#c9c2e0; margin-bottom:2px;}
  .stat-card .value{ font-family:'Black Han Sans'; font-size:20px; }
  .xp-bar-wrap{ margin:0 0 20px; }
  .xp-bar-label{ display:flex; justify-content:space-between; font-size:11px; color:#c9c2e0; margin-bottom:5px;}
  .xp-bar{ height:10px; background:rgba(255,255,255,0.08); border-radius:999px; overflow:hidden; }
  .xp-fill{ height:100%; background:linear-gradient(90deg, var(--arcane-dim), var(--arcane)); border-radius:999px; transition:width .5s ease; }

  .hero-art{ display:flex; justify-content:center; margin:6px 0 18px; }

  button.main-btn{
    width:100%; font-family:'Black Han Sans', sans-serif; font-size:18px; letter-spacing:0.5px; padding:15px;
    border:none; border-radius:14px; cursor:pointer; color:#1a1033;
    background:linear-gradient(180deg, #ffe08a, var(--gold));
    box-shadow:0 6px 0 var(--gold-dark), 0 10px 20px rgba(0,0,0,0.35);
    transition:transform .08s; margin-bottom:10px;
  }
  button.main-btn:active{ transform:translateY(4px); box-shadow:0 2px 0 var(--gold-dark); }
  button.main-btn:disabled{ opacity:0.45; cursor:not-allowed; box-shadow:none; }
  button.ghost-btn{
    width:100%; font-family:'Black Han Sans', sans-serif; font-size:14px; padding:12px; border-radius:12px;
    border:1px solid rgba(255,255,255,0.25); background:rgba(255,255,255,0.04); color:var(--cloud); cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:8px;
  }
  button.ghost-btn:disabled{ opacity:0.4; cursor:not-allowed; }

  .top-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .lives{ display:flex; gap:5px; }
  .heart{ font-size:18px; transition:transform .3s; }
  .heart.broken{ opacity:0.15; transform:scale(0.6) rotate(20deg); filter:grayscale(1); }
  .wave-progress{ font-size:12px; color:#c9c2e0; font-weight:700; }

  .arena{ position:relative; height:200px; display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
  .magic-circle{
    position:absolute; width:150px; height:150px; border-radius:50%;
    background:conic-gradient(from 0deg, rgba(94,231,255,0.05), rgba(94,231,255,0.35), rgba(94,231,255,0.05));
    animation:spin 6s linear infinite; filter:blur(1px);
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  #monster-slot{ position:relative; width:130px; height:130px; display:flex; align-items:center; justify-content:center; animation: bob 2.2s ease-in-out infinite; z-index:2; }
  @keyframes bob{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }
  #monster-slot.hit{ animation:hitflash .3s ease; }
  @keyframes hitflash{ 0%{ filter:brightness(1); transform:translateX(0); } 25%{ filter:brightness(3) saturate(0); transform:translateX(-6px); } 50%{ transform:translateX(6px); } 100%{ filter:brightness(1); transform:translateX(0); } }
  #monster-slot.defeated{ animation:defeat .55s ease forwards; }
  @keyframes defeat{ 0%{ opacity:1; transform:scale(1) rotate(0); } 100%{ opacity:0; transform:scale(0.2) rotate(35deg) translateY(20px); } }
  #monster-slot.flee{ animation:flee .5s ease forwards; }
  @keyframes flee{ 0%{ opacity:1; transform:translateY(0) scale(1); } 100%{ opacity:0; transform:translateY(-90px) scale(0.6); } }
  .gold-pop{
    position:absolute; top:10px; left:50%; transform:translateX(-50%); font-family:'Black Han Sans'; color:var(--gold);
    font-size:18px; text-shadow:0 0 8px rgba(255,209,102,0.8); animation:goldpop 0.9s ease forwards; pointer-events:none; z-index:5;
  }
  @keyframes goldpop{ 0%{ opacity:0; transform:translate(-50%, 10px) scale(0.7); } 30%{ opacity:1; transform:translate(-50%, -10px) scale(1.1); } 100%{ opacity:0; transform:translate(-50%, -45px) scale(1); } }

  .quiz-scroll{
    background:linear-gradient(180deg, #f7f2ff, #ece3ff); color:#241447; border-radius:14px; padding:18px; text-align:center;
    font-family:'Black Han Sans'; font-size:30px; margin-bottom:14px; box-shadow:0 10px 22px rgba(0,0,0,0.35); letter-spacing:1px;
  }
  #ans-input{
    width:100%; font-family:'Black Han Sans'; font-size:22px; text-align:center; padding:13px; border-radius:12px;
    border:2px solid var(--arcane-dim); background:rgba(255,255,255,0.06); color:var(--cloud); outline:none; margin-bottom:6px;
  }
  #ans-input:focus{ border-color:var(--arcane); box-shadow:0 0 0 3px rgba(94,231,255,0.2); }
  .hint{ text-align:center; font-size:11px; color:#a89fc9; }

  .arena.shake{ animation:shake .4s; }
  @keyframes shake{ 0%,100%{ transform:translateX(0); } 20%{ transform:translateX(-8px); } 40%{ transform:translateX(8px); } 60%{ transform:translateX(-5px); } 80%{ transform:translateX(5px); } }

  .jail-item{ display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.05); border:1px solid rgba(94,231,255,0.2); border-radius:12px; padding:10px 12px; margin-bottom:10px; }
  .jail-item.shatter{ animation:shatter .4s ease forwards; }
  @keyframes shatter{ to{ opacity:0; transform:scale(0.7) rotate(8deg); } }
  .jail-mini{ width:44px; height:44px; flex-shrink:0; filter:brightness(0.75) saturate(1.3); position:relative; }
  .jail-mini::after{ content:""; position:absolute; inset:-3px; border-radius:10px; background:linear-gradient(135deg, rgba(94,231,255,0.25), transparent 60%); border:1px solid rgba(94,231,255,0.4); }
  .jail-info{ flex:1; margin:0 10px; font-size:13px; font-weight:700; }
  .jail-input{ width:52px; padding:7px; text-align:center; border-radius:8px; border:1px solid var(--arcane-dim); background:rgba(255,255,255,0.08); color:var(--cloud); font-family:'Black Han Sans'; font-size:14px; margin-right:6px; }
  .purify-btn{ font-family:'Black Han Sans'; font-size:12px; padding:8px 10px; border-radius:8px; border:none; background:linear-gradient(180deg,#7ef2c2,#2dd4a0); color:#0b3527; cursor:pointer; }
  .empty-note{ text-align:center; font-size:13px; color:#c9c2e0; padding:20px 0; }

  table.leaderboard{ width:100%; border-collapse:collapse; margin-top:6px; font-size:13.5px; }
  table.leaderboard th{ text-align:left; font-size:11px; color:#a89fc9; padding:6px 6px; border-bottom:2px solid rgba(255,255,255,0.15); }
  table.leaderboard td{ padding:9px 6px; border-bottom:1px solid rgba(255,255,255,0.08); font-weight:600; }
  table.leaderboard tr.me td{ color:var(--gold); }
  .rank-num{ font-family:'Black Han Sans'; color:var(--arcane); width:22px; display:inline-block; }
  .board-loading{ text-align:center; padding:24px 0; color:#a89fc9; font-size:13.5px; }

  #modal-overlay{ position:fixed; inset:0; background:rgba(5,2,15,0.75); display:none; align-items:center; justify-content:center; z-index:50; backdrop-filter:blur(2px); }
  #modal-overlay.show{ display:flex; animation:fadeIn .25s ease; }
  #modal-box{ background:linear-gradient(160deg,#2a1a52,#150c30); border:1px solid rgba(94,231,255,0.3); border-radius:16px; padding:26px 22px; width:85%; max-width:320px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.6); }
  #modal-title{ font-family:'Black Han Sans'; font-size:20px; margin-bottom:10px; color:var(--gold); }
  #modal-msg{ font-size:14px; line-height:1.7; white-space:pre-line; margin-bottom:18px; color:var(--cloud); }
  #modal-btn{ font-family:'Black Han Sans'; font-size:15px; padding:11px 26px; border-radius:10px; border:none; background:linear-gradient(180deg,#ffe08a,var(--gold)); color:#1a1033; cursor:pointer; }
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div id="game-container">

  <!-- 1. 홈 화면 -->
  <div id="screen-home" class="screen active">
    <div class="eyebrow">MATH WIZARD</div>
    <h2 class="title">🧙 수학 마법사: 연산 방어전</h2>

    <div class="hero-art">
      <svg width="90" height="90" viewBox="0 0 100 100">
        <path d="M50 8 L64 34 L36 34 Z" fill="#5ee7ff"/>
        <circle cx="50" cy="52" r="20" fill="#f3edff"/>
        <circle cx="43" cy="50" r="3" fill="#241447"/>
        <circle cx="57" cy="50" r="3" fill="#241447"/>
        <path d="M40 60 Q50 68 60 60" stroke="#241447" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M20 95 Q50 70 80 95 Z" fill="#3d2467"/>
        <circle cx="50" cy="30" r="4" fill="#ffd166"/>
      </svg>
    </div>

    <input type="text" id="playerNameInput" placeholder="마법사 이름(닉네임)을 입력하세요" maxlength="10">

    <div class="stat-panel">
      <div class="stat-card"><div class="label">골드</div><div class="value" id="user-gold">0 💰</div></div>
      <div class="stat-card"><div class="label">레벨</div><div class="value" id="user-level">1 ⭐</div></div>
    </div>
    <div class="xp-bar-wrap">
      <div class="xp-bar-label"><span>경험치</span><span id="xp-text">0 / 100</span></div>
      <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    </div>

    <button class="main-btn" id="startBtn" disabled>⚔️ 방어전 시작</button>
    <button class="ghost-btn" id="btn-jail">👿 몬스터 감옥 (<span id="jail-count">0</span>)</button>
    <button class="ghost-btn" id="btn-board">🏆 명예의 전당</button>
  </div>

  <!-- 2. 전투 화면 -->
  <div id="screen-game" class="screen">
    <div class="top-row">
      <div class="lives" id="lives-row"></div>
      <div class="wave-progress" id="wave-progress">사냥 0 / 5</div>
    </div>
    <div class="arena" id="arena">
      <div class="magic-circle"></div>
      <div id="monster-slot"></div>
    </div>
    <div class="quiz-scroll" id="quiz-box">문제 생성 중...</div>
    <input type="number" id="ans-input" placeholder="정답 입력">
    <div class="hint">엔터를 눌러 마법 공격!</div>
  </div>

  <!-- 3. 감옥 화면 -->
  <div id="screen-jail" class="screen">
    <div class="eyebrow">CRYSTAL PRISON</div>
    <h2 class="title" style="font-size:20px;">👿 몬스터 감옥</h2>
    <p style="font-size:12.5px; color:#c9c2e0; text-align:center; margin-top:-6px; margin-bottom:16px;">틀린 문제를 다시 맞혀 몬스터를 정화하세요!</p>
    <div id="jail-list"></div>
    <button class="ghost-btn" id="backFromJailBtn">🏠 돌아가기</button>
  </div>

  <!-- 4. 명예의 전당 -->
  <div id="screen-board" class="screen">
    <div class="eyebrow">HALL OF FAME</div>
    <h2 class="title" style="font-size:20px;">🏆 명예의 전당</h2>
    <div id="board-body" class="board-loading">기록을 불러오는 중...</div>
    <button class="ghost-btn" id="backFromBoardBtn" style="margin-top:12px;">🏠 돌아가기</button>
  </div>

</div>

<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-title"></div>
    <div id="modal-msg"></div>
    <button id="modal-btn">확인</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, addDoc, query, orderBy, limit, getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ⚠️ 본인 프로젝트의 firebaseConfig로 이미 교체되어 있어요.
  const firebaseConfig = {
    apiKey: "AIzaSyDR25To5EQPfqgblQ16ZmqaSPZ4jqw0Z5A",
    authDomain: "hobary.firebaseapp.com",
    projectId: "hobary",
    storageBucket: "hobary.firebasestorage.app",
    messagingSenderId: "689501219140",
    appId: "1:689501219140:web:03dba08f70e1de66538f11",
    measurementId: "G-H4RKYYC5ZB"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  /* ---------- 배경 별 생성 ---------- */
  const starsWrap = document.getElementById('stars');
  for(let i=0;i<50;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*100 + '%';
    s.style.animationDelay = (Math.random()*3) + 's';
    s.style.width = s.style.height = (Math.random()*2+1) + 'px';
    starsWrap.appendChild(s);
  }

  /* ---------- 몬스터 종족 ---------- */
  const MONSTERS = [
    { name:"슬라임", svg:`<svg width="120" height="120" viewBox="0 0 120 120">
        <ellipse cx="60" cy="78" rx="46" ry="34" fill="#2dd4bf"/>
        <path d="M18 72 Q14 40 60 32 Q106 40 102 72 Q104 90 88 92 Q60 100 32 92 Q16 90 18 72Z" fill="#5eead4"/>
        <ellipse cx="42" cy="58" rx="7" ry="9" fill="#0f172a"/>
        <ellipse cx="76" cy="58" rx="7" ry="9" fill="#0f172a"/>
        <circle cx="44" cy="55" r="2" fill="#fff"/><circle cx="78" cy="55" r="2" fill="#fff"/>
        <path d="M46 74 Q60 84 74 74" stroke="#0f172a" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse cx="45" cy="42" rx="10" ry="6" fill="#ffffff" opacity="0.5"/>
      </svg>` },
    { name:"박쥐 몬스터", svg:`<svg width="120" height="120" viewBox="0 0 120 120">
        <path d="M60 40 L10 20 Q28 55 55 55Z" fill="#7c3aed"/>
        <path d="M60 40 L110 20 Q92 55 65 55Z" fill="#7c3aed"/>
        <ellipse cx="60" cy="66" rx="26" ry="30" fill="#5b21b6"/>
        <path d="M48 40 L52 52 L44 52Z" fill="#5b21b6"/>
        <path d="M72 40 L76 52 L68 52Z" fill="#5b21b6"/>
        <circle cx="50" cy="66" r="6" fill="#ff4d6d"/>
        <circle cx="70" cy="66" r="6" fill="#ff4d6d"/>
        <path d="M50 82 L54 76 L60 82 L66 76 L70 82" stroke="#f3edff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>` },
    { name:"도깨비불", svg:`<svg width="120" height="120" viewBox="0 0 120 120">
        <path d="M60 18 Q84 44 78 70 Q76 96 60 104 Q44 96 42 70 Q36 44 60 18Z" fill="#ff7847"/>
        <path d="M60 40 Q72 56 68 74 Q66 88 60 92 Q54 88 52 74 Q48 56 60 40Z" fill="#ffd166"/>
        <ellipse cx="60" cy="66" rx="8" ry="10" fill="#3d2467"/>
        <circle cx="57" cy="63" r="2" fill="#fff"/>
        <path d="M50 30 L54 22" stroke="#ff7847" stroke-width="3" stroke-linecap="round"/>
        <path d="M70 30 L66 22" stroke="#ff7847" stroke-width="3" stroke-linecap="round"/>
      </svg>` },
    { name:"돌골렘", svg:`<svg width="120" height="120" viewBox="0 0 120 120">
        <polygon points="60,20 92,36 92,74 60,100 28,74 28,36" fill="#78716c"/>
        <polygon points="60,32 82,42 82,68 60,84 38,68 38,42" fill="#a8a29e"/>
        <circle cx="49" cy="52" r="5" fill="#5ee7ff"/>
        <circle cx="71" cy="52" r="5" fill="#5ee7ff"/>
        <circle cx="45" cy="40" r="3" fill="#57534e"/>
        <circle cx="78" cy="66" r="3" fill="#57534e"/>
        <circle cx="55" cy="76" r="3" fill="#57534e"/>
      </svg>` },
    { name:"유령", svg:`<svg width="120" height="120" viewBox="0 0 120 120">
        <path d="M28 90 L28 55 Q28 20 60 20 Q92 20 92 55 L92 90 Q84 80 76 90 Q68 80 60 90 Q52 80 44 90 Q36 80 28 90Z" fill="#ede9fe"/>
        <ellipse cx="47" cy="55" rx="6" ry="8" fill="#3d2467"/>
        <ellipse cx="73" cy="55" rx="6" ry="8" fill="#3d2467"/>
        <ellipse cx="60" cy="72" rx="8" ry="6" fill="#3d2467"/>
      </svg>` },
    { name:"꼬마 드래곤", svg:`<svg width="120" height="120" viewBox="0 0 120 120">
        <ellipse cx="60" cy="70" rx="32" ry="28" fill="#4ade80"/>
        <path d="M40 46 Q30 30 44 26 Q46 38 50 44Z" fill="#22c55e"/>
        <path d="M80 46 Q90 30 76 26 Q74 38 70 44Z" fill="#22c55e"/>
        <path d="M58 34 L62 34 L60 22Z" fill="#22c55e"/>
        <circle cx="49" cy="66" r="6" fill="#0f172a"/>
        <circle cx="73" cy="66" r="6" fill="#0f172a"/>
        <circle cx="51" cy="63" r="2" fill="#fff"/><circle cx="75" cy="63" r="2" fill="#fff"/>
        <path d="M45 82 Q60 92 77 82" stroke="#166534" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="47" cy="76" r="2" fill="#166534"/><circle cx="79" cy="76" r="2" fill="#166534"/>
      </svg>` }
  ];

  /* ---------- 상태 ---------- */
  let playerName = "";
  let playerData = { gold:0, level:1, exp:0 };
  let wrongQuestions = [];
  let currentGame = { currentAns:0, lives:3, count:0, maxCount:5, currentQuestionRaw:null, currentSpecies:null, locked:false };

  const $ = (id) => document.getElementById(id);

  function switchScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    $(id).classList.add('active');
  }

  function randomMonster(){ return MONSTERS[Math.floor(Math.random()*MONSTERS.length)]; }

  function showModal(title, msg, btnText, cb){
    $('modal-title').textContent = title;
    $('modal-msg').textContent = msg;
    $('modal-btn').textContent = btnText || "확인";
    $('modal-overlay').classList.add('show');
    $('modal-btn').onclick = function(){
      $('modal-overlay').classList.remove('show');
      if(cb) cb();
    };
  }

  function updateHome(){
    $('user-gold').innerHTML = playerData.gold + ' 💰';
    $('user-level').innerHTML = playerData.level + ' ⭐';
    const need = playerData.level*100;
    $('xp-text').textContent = `${playerData.exp} / ${need}`;
    $('xp-fill').style.width = Math.min(100,(playerData.exp/need)*100) + '%';
    $('jail-count').textContent = wrongQuestions.length;
    $('btn-jail').disabled = wrongQuestions.length === 0;
  }

  function goHome(){ switchScreen('screen-home'); updateHome(); }

  function renderLives(){
    const row = $('lives-row');
    row.innerHTML = '';
    for(let i=0;i<3;i++){
      const span = document.createElement('span');
      span.className = 'heart' + (i >= currentGame.lives ? ' broken' : '');
      span.textContent = '❤️';
      row.appendChild(span);
    }
  }

  function startGame(){
    currentGame.lives = 3;
    currentGame.count = 0;
    switchScreen('screen-game');
    renderLives();
    nextQuestion();
  }

  function spawnMonster(){
    const species = randomMonster();
    currentGame.currentSpecies = species;
    const slot = $('monster-slot');
    slot.className = '';
    slot.innerHTML = species.svg;
    void slot.offsetWidth;
  }

  function nextQuestion(){
    if(currentGame.count >= currentGame.maxCount || currentGame.lives <= 0){
      endWave();
      return;
    }
    currentGame.locked = false;
    $('wave-progress').textContent = `사냥 ${currentGame.count} / ${currentGame.maxCount}`;
    renderLives();
    $('ans-input').value = '';
    $('ans-input').focus();
    spawnMonster();

    const lvl = playerData.level;
    const useMultiply = lvl >= 3 && Math.random() < 0.25;
    let qText, ans, raw;

    if(useMultiply){
      const a = Math.floor(Math.random()*8)+2;
      const b = Math.floor(Math.random()*8)+2;
      qText = `${a} × ${b}`;
      ans = a*b;
      raw = { a, b, type:'×' };
    } else {
      const range = 70 + lvl*10;
      let num1 = Math.floor(Math.random()*range)+10;
      let num2 = Math.floor(Math.random()*range)+10;
      const isPlus = Math.random() > 0.5;
      if(!isPlus && num1 < num2){ const t=num1; num1=num2; num2=t; }
      qText = isPlus ? `${num1} + ${num2}` : `${num1} - ${num2}`;
      ans = isPlus ? num1+num2 : num1-num2;
      raw = { a:num1, b:num2, type:isPlus?'+':'-' };
    }

    currentGame.currentAns = ans;
    currentGame.currentQuestionRaw = raw;
    $('quiz-box').textContent = qText + ' = ?';
  }

  function popGold(amount){
    const arena = $('arena');
    const pop = document.createElement('div');
    pop.className = 'gold-pop';
    pop.textContent = '+' + amount + '💰';
    arena.appendChild(pop);
    setTimeout(()=> pop.remove(), 900);
  }

  function checkAnswer(event){
    if(event.key !== 'Enter' || currentGame.locked) return;
    currentGame.locked = true;
    const inputAns = parseInt($('ans-input').value);
    const slot = $('monster-slot');

    if(inputAns === currentGame.currentAns){
      currentGame.count++;
      slot.classList.add('hit');
      popGold(10);
      setTimeout(()=>{
        slot.classList.remove('hit');
        slot.classList.add('defeated');
        setTimeout(nextQuestion, 500);
      }, 280);
    } else {
      currentGame.lives--;
      $('arena').classList.add('shake');
      setTimeout(()=> $('arena').classList.remove('shake'), 400);

      const raw = currentGame.currentQuestionRaw;
      const qStr = `${raw.a} ${raw.type} ${raw.b}`;
      if(!wrongQuestions.some(q => q.text === qStr)){
        wrongQuestions.push({ text:qStr, ans:currentGame.currentAns, species: currentGame.currentSpecies });
      }
      setTimeout(()=>{
        slot.classList.add('flee');
        setTimeout(nextQuestion, 450);
      }, 200);
    }
  }

  /* ---------- Firestore 연동 ---------- */
  async function saveScoreToLeaderboard(waveScore, waveTotal){
    try{
      await addDoc(collection(db, "leaderboard"), {
        name: playerName || "이름없음",
        score: waveScore,
        total: waveTotal,
        level: playerData.level,
        date: new Date().toISOString().slice(0,10)
      });
    }catch(e){
      console.error("리더보드 저장 실패:", e);
    }
  }

  async function loadLeaderboard(){
    const boardBody = $('board-body');
    boardBody.className = 'board-loading';
    boardBody.textContent = '기록을 불러오는 중...';
    try{
      const q = query(collection(db, "leaderboard"), orderBy("score","desc"), limit(15));
      const snap = await getDocs(q);
      const rows = [];
      snap.forEach(doc => rows.push(doc.data()));

      if(rows.length === 0){
        boardBody.textContent = '아직 기록이 없어요. 첫 번째 마법사가 되어보세요!';
        return;
      }
      const trHtml = rows.map((item, idx) => {
        return `<tr><td><span class="rank-num">${idx+1}</span></td><td>${escapeHtml(item.name)}</td><td>${item.score} / ${item.total}</td><td>Lv.${item.level||1}</td></tr>`;
      }).join('');
      boardBody.className = '';
      boardBody.innerHTML = `<table class="leaderboard">
        <thead><tr><th></th><th>마법사 이름</th><th>점수</th><th>레벨</th></tr></thead>
        <tbody>${trHtml}</tbody>
      </table>`;
    }catch(e){
      console.error(e);
      boardBody.textContent = '기록을 불러오지 못했어요. 잠시 후 다시 시도해주세요.';
    }
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function endWave(){
    const goldEarned = currentGame.count*10;
    const expEarned = currentGame.count*20;
    playerData.gold += goldEarned;
    playerData.exp += expEarned;

    saveScoreToLeaderboard(currentGame.count, currentGame.maxCount);

    const resultMsg = currentGame.lives > 0
      ? `몬스터 ${currentGame.count}마리를 물리쳤어요!\n골드 +${goldEarned}💰  경험치 +${expEarned}✨\n(명예의 전당에 기록되었어요)`
      : `모든 기회를 다 썼어요...\n그래도 ${currentGame.count}마리를 물리쳤어요!\n골드 +${goldEarned}💰\n(명예의 전당에 기록되었어요)`;

    showModal('⚔️ 방어전 종료!', resultMsg, '확인', checkLevelUp);
  }

  function checkLevelUp(){
    const need = playerData.level*100;
    if(playerData.exp >= need){
      playerData.exp -= need;
      playerData.level++;
      showModal('🎉 레벨 업!', `대단해요! 레벨 ${playerData.level}이 되었습니다!\n더 어려운 몬스터와 곱셈 문제가 나타나요.`, '좋아요!', goHome);
    } else {
      goHome();
    }
  }

  function openJail(){
    switchScreen('screen-jail');
    renderJail();
  }

  function renderJail(){
    const listEl = $('jail-list');
    listEl.innerHTML = '';
    if(wrongQuestions.length === 0){
      listEl.innerHTML = '<div class="empty-note">감옥이 비었습니다. 모든 몬스터가 정화되었습니다! ✨</div>';
      return;
    }
    wrongQuestions.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'jail-item';
      div.id = 'jail-item-' + index;
      div.innerHTML = `
        <div class="jail-mini">${item.species.svg}</div>
        <div class="jail-info">${item.text} = ?</div>
        <input type="number" class="jail-input" id="jail-ans-${index}">
        <button class="purify-btn" data-idx="${index}">정화</button>
      `;
      listEl.appendChild(div);
    });
  }

  function solveJail(index){
    const inputEl = $(`jail-ans-${index}`);
    const inputAns = parseInt(inputEl.value);
    const target = wrongQuestions[index];
    if(!target) return;

    if(inputAns === target.ans){
      playerData.gold += 20;
      const itemEl = $('jail-item-' + index);
      itemEl.classList.add('shatter');
      setTimeout(()=>{
        wrongQuestions.splice(index,1);
        renderJail();
        updateHome();
      }, 380);
      showModal('✨ 정화 성공!', '보너스 20골드를 획득했습니다!', '좋아요');
    } else {
      inputEl.style.borderColor = 'var(--danger)';
      setTimeout(()=> inputEl.style.borderColor = 'var(--arcane-dim)', 500);
    }
  }

  /* ---------- 이벤트 연결 ---------- */
  $('playerNameInput').addEventListener('input', (e)=>{
    $('startBtn').disabled = e.target.value.trim().length === 0;
  });
  $('startBtn').addEventListener('click', ()=>{
    playerName = $('playerNameInput').value.trim().slice(0,10);
    startGame();
  });
  $('ans-input').addEventListener('keydown', checkAnswer);
  $('btn-jail').addEventListener('click', openJail);
  $('btn-board').addEventListener('click', ()=>{ switchScreen('screen-board'); loadLeaderboard(); });
  $('backFromJailBtn').addEventListener('click', goHome);
  $('backFromBoardBtn').addEventListener('click', goHome);
  $('jail-list').addEventListener('click', (e)=>{
    const btn = e.target.closest('.purify-btn');
    if(btn) solveJail(parseInt(btn.dataset.idx));
  });

  updateHome();
</script>
</body>
</html>
